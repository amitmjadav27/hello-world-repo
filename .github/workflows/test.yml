name: First github workflow

on: push

jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Repo
          uses: actions/checkout@v4

        - name: Welcome Message
          run: echo "Welcome to Github Actions"
        
        - name: List files
          run: ls -al
        
        - name: Read file
          run: cat README.md